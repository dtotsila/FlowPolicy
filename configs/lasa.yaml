project_name: "lasa_angle"

dataset:
  name: "lasa"
  pattern_name: "GShape"
  train_indices: [0, 1, 2, 3]
  val_indices: [4]
  test_indices: [5, 6]
  chunk_size: 16
  action_dim: 6
  state_dim: 6
  use_velocity: true
  use_acceleration: true

model:
  hidden_dim: 256
  num_layers: 4
  num_heads: 4

training:
  batch_size: 128
  epochs: 1000
  lr: 1.e-4
  device: "cuda"
  weight_decay: 0.
inference:
  sampling_steps: 8
  k_step: 4