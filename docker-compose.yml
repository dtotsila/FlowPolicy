services:
  flow_matching:
    build:
      context: .
      dockerfile: .ci/Dockerfile
    image: flow_matching_robotics
    volumes:
      - ./:/workspace
    environment:
      - WANDB_API_KEY=${WANDB_API_KEY}
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    stdin_open: true
    tty: true